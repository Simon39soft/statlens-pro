<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StatLens Pro — AI Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#03060F;--bg2:#07101F;--bg3:#0B1628;--blue:#2563EB;--cyan:#06B6D4;--white:#EEF4FF;--muted:#5A6A88;--border:rgba(37,99,235,0.12);--ok:#10B981;--err:#EF4444;--warn:#F59E0B}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:'Inter',sans-serif;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;background:rgba(3,6,15,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);transition:all .3s}
nav.scrolled{background:rgba(3,6,15,0.97);box-shadow:0 0 40px rgba(37,99,235,.08)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:900;font-size:14px;color:#fff}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--white)}
.logo-name span{color:var(--cyan)}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{font-size:14px;font-weight:500;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--white)}
.nav-btns{display:flex;gap:10px}
.btn{font-family:'Inter',sans-serif;font-size:14px;font-weight:600;border:none;cursor:pointer;border-radius:10px;transition:all .25s;display:inline-flex;align-items:center;gap:7px}
.btn-sm{padding:8px 16px}
.btn-md{padding:12px 26px}
.btn-lg{padding:15px 34px;font-size:15px}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,.08)}
.btn-ghost:hover{color:var(--white);border-color:rgba(255,255,255,.2)}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 4px 16px rgba(37,99,235,.3)}
.btn-blue:hover{background:#1D4ED8;transform:translateY(-1px);box-shadow:0 8px 28px rgba(37,99,235,.5)}
.btn-glow{background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;box-shadow:0 4px 20px rgba(37,99,235,.35);position:relative;overflow:hidden}
.btn-glow::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.18) 50%,transparent 70%);transform:translateX(-100%);transition:transform .5s}
.btn-glow:hover::before{transform:translateX(100%)}
.btn-glow:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(6,182,212,.4)}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:130px 40px 80px;position:relative;text-align:center;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(37,99,235,.18),transparent);top:-200px;left:-100px;animation:orb1 10s ease-in-out infinite}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(6,182,212,.12),transparent);top:80px;right:-80px;animation:orb1 10s ease-in-out infinite reverse;animation-delay:-4s}
.orb3{width:300px;height:300px;background:radial-gradient(circle,rgba(79,70,229,.14),transparent);bottom:60px;left:30%;animation:orb1 14s ease-in-out infinite;animation-delay:-7s}
@keyframes orb1{0%,100%{transform:translateY(0) scale(1)}40%{transform:translateY(-30px) scale(1.06)}70%{transform:translateY(18px) scale(.94)}}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(37,99,235,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.035) 1px,transparent 1px);background-size:72px 72px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent)}
.scan{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.35;animation:scan 5s linear infinite}
@keyframes scan{0%{top:-2%;opacity:0}5%{opacity:.35}95%{opacity:.35}100%{top:102%;opacity:0}}
.hero-inner{position:relative;z-index:10;max-width:840px}
.eyebrow{display:inline-flex;align-items:center;gap:8px;padding:5px 14px 5px 7px;border-radius:100px;background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.22);font-size:12.5px;font-weight:600;color:#93C5FD;margin-bottom:34px;letter-spacing:.3px;opacity:0;animation:fup .8s .2s forwards}
.eyebrow-dot{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff}
@keyframes fup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
h1{font-family:'Syne',sans-serif;font-size:clamp(42px,7vw,80px);font-weight:900;line-height:1.0;letter-spacing:-2.5px;margin-bottom:26px;opacity:0;animation:fup .9s .4s forwards}
.h1-top{display:block;color:var(--white)}
.h1-bot{display:block;background:linear-gradient(135deg,#60A5FA,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-p{font-size:17px;color:var(--muted);line-height:1.75;max-width:560px;margin:0 auto 40px;opacity:0;animation:fup .9s .6s forwards}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:64px;opacity:0;animation:fup .9s .8s forwards}
.ticker{display:flex;gap:1px;border-radius:14px;overflow:hidden;background:var(--border);max-width:660px;margin:0 auto;opacity:0;animation:fup .9s 1s forwards}
.tcell{flex:1;background:var(--bg2);padding:18px 22px;position:relative;overflow:hidden}
.tcell::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--cyan));transform:scaleX(0);transform-origin:left;animation:bar 1.8s 1.6s forwards ease-out}
@keyframes bar{to{transform:scaleX(1)}}
.tv{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:500;color:var(--cyan);display:block}
.tl{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.marquee{padding:14px 0;background:rgba(37,99,235,.04);border-top:1px solid var(--border);border-bottom:1px solid var(--border);overflow:hidden;white-space:nowrap}
.marquee-inner{display:inline-flex;gap:44px;animation:mq 22s linear infinite}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.mqi{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;display:inline-flex;align-items:center;gap:10px}
.mqi::before{content:'✦';color:var(--cyan);font-size:9px}
.section{padding:90px 40px;max-width:1080px;margin:0 auto}
.sec-eye{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);margin-bottom:14px}
.sec-h2{font-family:'Syne',sans-serif;font-size:clamp(30px,4vw,50px);font-weight:900;letter-spacing:-1.5px;line-height:1.05;margin-bottom:14px}
.sec-p{font-size:15px;color:var(--muted);line-height:1.7;max-width:460px;margin-bottom:48px}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s,transform .7s}
.reveal.in{opacity:1;transform:translateY(0)}
.dropzone{border:1.5px dashed rgba(37,99,235,.22);border-radius:18px;padding:64px 40px;text-align:center;cursor:pointer;position:relative;overflow:hidden;transition:all .4s;background:rgba(37,99,235,.02)}
.dropzone:hover{border-color:rgba(37,99,235,.5)}
.dropzone.over{border-color:var(--cyan);background:rgba(6,182,212,.04)}
.corner{position:absolute;width:18px;height:18px;border-color:var(--blue);border-style:solid;opacity:.45}
.ctlx{top:14px;left:14px;border-width:2px 0 0 2px;border-radius:3px 0 0 0}
.ctrx{top:14px;right:14px;border-width:2px 2px 0 0;border-radius:0 3px 0 0}
.cblx{bottom:14px;left:14px;border-width:0 0 2px 2px;border-radius:0 0 0 3px}
.cbrx{bottom:14px;right:14px;border-width:0 2px 2px 0;border-radius:0 0 3px 0}
.di{width:68px;height:68px;border-radius:18px;background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.18);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 22px;transition:transform .3s}
.dropzone:hover .di{transform:scale(1.08) translateY(-5px)}
.dropzone h3{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;margin-bottom:7px}
.dropzone>p{font-size:13px;color:var(--muted);margin-bottom:24px}
.badges{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.badge{padding:4px 12px;border-radius:7px;background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.16);font-size:12px;font-weight:700;color:#93C5FD;font-family:'JetBrains Mono',monospace}
#fi{display:none}
.loading{display:none;padding:56px 40px;text-align:center}
.loading.on{display:block}
.ring{width:72px;height:72px;border-radius:50%;border:3px solid rgba(37,99,235,.15);border-top-color:var(--blue);border-right-color:var(--cyan);animation:spin .9s linear infinite;margin:0 auto 22px}
@keyframes spin{to{transform:rotate(360deg)}}
.l-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:7px}
.l-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.steps{display:flex;flex-direction:column;gap:9px;max-width:300px;margin:0 auto;text-align:left}
.step{display:flex;align-items:center;gap:11px;font-size:13px;color:var(--muted);transition:color .3s}
.step.done{color:var(--ok)}.step.act{color:var(--white)}
.step-ic{width:18px;height:18px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.results{display:none;margin-top:36px}
.results.on{display:block}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:18px;transition:all .3s;position:relative;overflow:hidden}
.mc::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);opacity:0;transition:opacity .3s}
.mc:hover{border-color:rgba(37,99,235,.35);transform:translateY(-3px)}
.mc:hover::after{opacity:1}
.ml{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.mv{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:500;line-height:1;margin-bottom:5px}
.mv.up{color:var(--ok)}.mv.dn{color:var(--err)}.mv.info{color:var(--cyan)}
.ms{font-size:12px;color:var(--muted)}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:15px;overflow:hidden;margin-bottom:22px}
.ph{padding:15px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.pt{font-family:'Syne',sans-serif;font-size:14px;font-weight:800}
.pill{padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
.pill-r{background:rgba(239,68,68,.1);color:#FCA5A5}
.arow{display:flex;align-items:flex-start;gap:13p
